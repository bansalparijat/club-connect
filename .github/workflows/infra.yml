name: Infrastructure

on:
  push:
    branches: [dev]
    paths: ['infrastructure/**']
  pull_request:
    branches: [dev, main]
    paths: ['infrastructure/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply'
        required: true
        type: choice
        options: [dev, production]
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options: [plan, apply]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TERRAFORM_VERSION: '1.7.0'
  TERRAGRUNT_VERSION: '0.55.0'

jobs:
  # ── Plan on PRs ──────────────────────────────────────────────
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        environment: [dev]

    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.DEV_ROLE_ARN }}
          aws-region: ap-south-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v$TERRAGRUNT_VERSION/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt

      - name: Terragrunt plan
        id: plan
        working-directory: infrastructure/terragrunt/staging
        run: |
          terragrunt run-all plan --terragrunt-non-interactive 2>&1 | tee /tmp/plan-output.txt
          echo "plan<<EOF" >> $GITHUB_OUTPUT
          tail -100 /tmp/plan-output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.plan }}`.slice(-3000);
            const body = `### Terraform Plan (dev)\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  # ── Apply dev on push to dev ─────────────────────────────────
  apply-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: dev

    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.DEV_ROLE_ARN }}
          aws-region: ap-south-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v$TERRAGRUNT_VERSION/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create ECR + SQS + DynamoDB first
        working-directory: infrastructure/terragrunt/staging
        run: |
          terragrunt apply --terragrunt-non-interactive -target=aws_ecr_repository.api --terragrunt-working-dir api-lambda 2>/dev/null || true
          terragrunt run-all apply --terragrunt-non-interactive --terragrunt-ignore-dependency-errors \
            --terragrunt-include-dir sqs --terragrunt-include-dir dynamodb 2>/dev/null || true

      - name: Seed ECR with Docker image (first-time bootstrap)
        run: |
          REPO_NAME="club-connect-api-staging"
          REGION="ap-south-1"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com"

          # Skip if repo already has images
          IMAGE_COUNT=$(aws ecr describe-images --repository-name "$REPO_NAME" --query 'length(imageDetails)' --output text 2>/dev/null || echo "0")
          if [ "$IMAGE_COUNT" != "0" ] && [ "$IMAGE_COUNT" != "None" ]; then
            echo "ECR already has images, skipping"
            exit 0
          fi

          echo "Building and pushing initial Docker image..."
          aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$REGISTRY"
          docker build -f apps/api/Dockerfile -t "$REGISTRY/$REPO_NAME:latest" .
          docker push "$REGISTRY/$REPO_NAME:latest"

      - name: Terragrunt apply (all modules)
        working-directory: infrastructure/terragrunt/staging
        run: terragrunt run-all apply --terragrunt-non-interactive

  # ── Manual apply (any environment) ───────────────────────────
  manual-apply:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ inputs.environment == 'production' && vars.PROD_ROLE_ARN || vars.DEV_ROLE_ARN }}
          aws-region: ap-south-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Terragrunt
        run: |
          curl -sL "https://github.com/gruntwork-io/terragrunt/releases/download/v$TERRAGRUNT_VERSION/terragrunt_linux_amd64" \
            -o /usr/local/bin/terragrunt && chmod +x /usr/local/bin/terragrunt

      - name: Determine directory
        id: dir
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "path=infrastructure/terragrunt/production" >> $GITHUB_OUTPUT
          else
            echo "path=infrastructure/terragrunt/staging" >> $GITHUB_OUTPUT
          fi

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Seed ECR with Docker image (first-time bootstrap)
        if: inputs.action == 'apply'
        run: |
          ENV_NAME="${{ inputs.environment == 'production' && 'production' || 'staging' }}"
          REPO_NAME="club-connect-api-${ENV_NAME}"
          REGION="ap-south-1"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com"

          # Create ECR repo if it doesn't exist
          aws ecr describe-repositories --repository-names "$REPO_NAME" 2>/dev/null || \
            aws ecr create-repository --repository-name "$REPO_NAME" --image-scanning-configuration scanOnPush=true --no-cli-pager

          # Skip if repo already has images
          IMAGE_COUNT=$(aws ecr describe-images --repository-name "$REPO_NAME" --query 'length(imageDetails)' --output text 2>/dev/null || echo "0")
          if [ "$IMAGE_COUNT" != "0" ] && [ "$IMAGE_COUNT" != "None" ]; then
            echo "ECR already has images, skipping"
            exit 0
          fi

          echo "Building and pushing initial Docker image..."
          aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$REGISTRY"
          docker build -f apps/api/Dockerfile -t "$REGISTRY/$REPO_NAME:latest" .
          docker push "$REGISTRY/$REPO_NAME:latest"

      - name: Terragrunt ${{ inputs.action }}
        working-directory: ${{ steps.dir.outputs.path }}
        run: terragrunt run-all ${{ inputs.action }} --terragrunt-non-interactive

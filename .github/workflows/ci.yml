name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo lint

      - name: Typecheck
        run: pnpm turbo typecheck

      - name: Create DynamoDB test table
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          aws dynamodb create-table \
            --endpoint-url http://localhost:8000 \
            --table-name club-connect-test \
            --attribute-definitions \
              AttributeName=PK,AttributeType=S \
              AttributeName=SK,AttributeType=S \
              AttributeName=GSI1PK,AttributeType=S \
              AttributeName=GSI1SK,AttributeType=S \
              AttributeName=GSI2PK,AttributeType=S \
              AttributeName=GSI2SK,AttributeType=S \
            --key-schema \
              AttributeName=PK,KeyType=HASH \
              AttributeName=SK,KeyType=RANGE \
            --global-secondary-indexes \
              '[{"IndexName":"GSI1","KeySchema":[{"AttributeName":"GSI1PK","KeyType":"HASH"},{"AttributeName":"GSI1SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}},{"IndexName":"GSI2","KeySchema":[{"AttributeName":"GSI2PK","KeyType":"HASH"},{"AttributeName":"GSI2SK","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
            --billing-mode PAY_PER_REQUEST \
            --no-cli-pager

      - name: Test
        env:
          DYNAMODB_TABLE_NAME: club-connect-test
          DYNAMODB_ENDPOINT: http://localhost:8000
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-south-1
          JWT_SECRET: ci-test-jwt-secret-at-least-32-characters
          JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
          NODE_ENV: development
        run: pnpm turbo test

      - name: Docker build (smoke test)
        run: docker build -f apps/api/Dockerfile -t club-connect-api:ci .

  deploy-dev:
    needs: ci
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: dev

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: ap-south-1
      ECR_REPO: club-connect-api-dev

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.DEV_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:latest

      - name: Update API Lambda
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name club-connect-api-dev \
            --image-uri $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name club-connect-api-dev

      - name: Update Worker Lambda
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws lambda update-function-code \
            --function-name club-connect-worker-dev \
            --image-uri $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name club-connect-worker-dev

      - name: Smoke test
        run: |
          API_URL=$(aws apigatewayv2 get-apis --query "Items[?Name=='club-connect-dev'].ApiEndpoint" --output text)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL/api/health" --max-time 30)
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "Smoke test passed: HTTP $STATUS"
